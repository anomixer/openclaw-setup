site_name: 🦞 OpenClaw 宇宙戰地日誌 (含 🦙 Ollama 安裝指南)
site_description: The chaotic, cynical, and utterly biased war log of the OpenClaw universe.
site_url: ""

repo_url: https://github.com/anomixer/openclaw-setup
repo_name: anomixer/openclaw-setup

theme:
  name: material
  logo: pic/clawbrian-explosion.png
  favicon: pic/clawbrian-explosion.png
  features:
    - navigation.tabs
    - toc.integrate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  alternate:
    - name: 繁體中文
      link: /openclaw-setup/
      lang: zh
    - name: English
      link: /openclaw-setup/en/
      lang: en

nav:
  - 🦞 戰況日誌 (Murmur): index.md
  - 📖 README (Windows Setup): setup.md
  - 🎯 模型選用: docs/what-model.md
  - 🚀 WSL2 教學: docs/wsl2-guide.md
  - 🤔 為什麼需要 WSL2: docs/why-wsl2.md
  - 🔄 遷移指南: docs/migration-guide.md

docs_dir: build_docs_zh
site_dir: site

extra_css:
  - custom.css
