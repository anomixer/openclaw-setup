name: Deploy MkDocs Site
on:
  push:
    branches:
      - main
      - murmur-runner
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Prepare build directory
        run: node code/build_prep.js

      - name: Build ZH with MkDocs
        run: |
          cp code/mkdocs.yml mkdocs.yml
          mkdocs build

      - name: Build EN with MkDocs
        run: |
          cp code/mkdocs.en.yml mkdocs.yml
          mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
